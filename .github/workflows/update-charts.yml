name: Update Checkonchain Chart Index

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh chart index
        run: node scripts/update-charts.js

      - name: Commit changes
        run: |
          if git diff --quiet -- data/charts.js; then
            echo "No chart index changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/charts.js
          git commit -m "Update Checkonchain chart index"
          git push
